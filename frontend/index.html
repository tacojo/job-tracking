<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#228b22" id="theme-color-meta" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23228b22'/%3E%3Cpath fill='%23fff' d='M10 6h6v3h-6V6zm-2 5h18v15H8V11zm3 3v9h12v-9H11z'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Open+Sans:wght@400;500;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>Job Tracker</title>
    <script>
      (function() {
        var t = localStorage.getItem('job_tracker_theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', t);
        var m = document.getElementById('theme-color-meta');
        if (m) m.setAttribute('content', t === 'dark' ? '#212529' : '#228b22');
      })();
    </script>
  </head>
  <body class="app-shell">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
