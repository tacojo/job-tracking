services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./storage/db/job_tracking.db}
      - DATABASE_URL_POSTGRES=${DATABASE_URL_POSTGRES:-}
      - STORAGE_PATH=${STORAGE_PATH:-./storage}
      - FILES_ROOT=${FILES_ROOT:-/app/storage/files}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_STORAGE_BUCKET=${SUPABASE_STORAGE_BUCKET:-job-tracker-files}
      - BYPASS_AUTH=${BYPASS_AUTH:-true}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - SECRETS_ENCRYPTION_KEY=${SECRETS_ENCRYPTION_KEY:-}
      - SUPERUSER_EMAILS=${SUPERUSER_EMAILS:-}
    volumes:
      - ./storage:/app/storage
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./docs:/app/docs
      - ./scripts/ensure-project-log-docs.mjs:/app/scripts/ensure-project-log-docs.mjs
    depends_on:
      - backend
